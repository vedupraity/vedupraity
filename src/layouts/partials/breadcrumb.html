<nav aria-label="breadcrumb" class="breadcrumb">
    <ol>
        {{ range .Ancestors.Reverse }}
        <li>
            <a href="{{ .RelPermalink }}">{{ with .Params.shortTitle }}{{ .}}{{ else }}{{ .Title }}{{ end }}</a>
        </li>
        <li>></li>
        {{ end }}
        <li class="active">
            <a aria-current="page" href="{{ .RelPermalink }}">{{ with .Params.shortTitle }}{{ .}}{{ else }}{{ .Title }}{{ end }}</a>
        </li>
    </ol>
</nav>
